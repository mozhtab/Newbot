name: Run Aut News Bot

on:
  schedule:
    - cron: '0 */6 * * *' # هر شش ساعت یک‌بار اجرا می‌شود
  workflow_dispatch: # دکمه اجرای دستی

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install requests beautifulsoup4

      - name: Run Script
        run: python bot.py

      - name: Save Memory
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add memory.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update memory" && git push)
